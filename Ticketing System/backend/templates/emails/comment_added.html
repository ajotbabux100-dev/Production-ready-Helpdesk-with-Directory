{% extends "emails/base.html" %}
{% block content %}
<p>Dear {{ ticket.requester.first_name }},</p>
<p>There is a new update on your support ticket.</p>
<div class="ticket-box" style="background:#f8f9fa; border-left:4px solid #1e3a5f; padding:16px; margin:20px 0; border-radius:4px;">
  <p><strong>Ticket Number:</strong> {{ ticket.ticket_number }}</p>
  <p><strong>Subject:</strong> {{ ticket.title }}</p>
  <p><strong>Status:</strong> {{ ticket.get_status_display }}</p>
</div>
<a href="{{ frontend_url }}/tickets/{{ ticket.id }}" class="btn" style="display:inline-block; margin:20px 0; padding:12px 28px; background:#1e3a5f; color:#ffffff; text-decoration:none; border-radius:6px; font-weight:bold; font-size:14px;">View Update</a>
{% endblock %}
